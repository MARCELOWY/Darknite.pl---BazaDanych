<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Darknite.pl - Generator Gier JSON</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, sans-serif;
        }

        body{
            background:#050505;
            color:white;
            height:100vh;
            display:flex;
        }

        .sidebar{
            width:300px;
            background:#0d0d0d;
            border-right:1px solid rgba(255,255,255,0.08);
            padding:20px;
            overflow-y:auto;
        }

        .sidebar h1{
            font-size:22px;
            margin-bottom:20px;
        }

        .file-list{
            display:flex;
            flex-direction:column;
            gap:10px;
        }

        .file-item{
            background:#151515;
            border:1px solid rgba(255,255,255,0.05);
            padding:14px;
            border-radius:12px;
            cursor:pointer;
            transition:0.2s;
        }

        .file-item:hover{
            border-color:#ff6600;
            transform:translateX(3px);
        }

        .top-buttons{
            display:flex;
            flex-direction:column;
            gap:10px;
            margin-bottom:20px;
        }

        button{
            background:#ff6600;
            color:white;
            border:none;
            padding:14px;
            border-radius:12px;
            font-weight:bold;
            cursor:pointer;
            transition:0.2s;
        }

        button:hover{
            opacity:0.9;
        }

        .editor{
            flex:1;
            padding:40px;
            overflow-y:auto;
        }

        .editor h2{
            margin-bottom:25px;
            font-size:30px;
        }

        .form-grid{
            display:grid;
            grid-template-columns:1fr 1fr;
            gap:20px;
        }

        .input-group{
            display:flex;
            flex-direction:column;
            gap:8px;
        }

        .input-group label{
            font-size:14px;
            color:#aaa;
        }

        input, select{
            background:#111;
            border:1px solid rgba(255,255,255,0.08);
            color:white;
            padding:14px;
            border-radius:12px;
            outline:none;
        }

        input:focus,
        select:focus{
            border-color:#ff6600;
        }

        .full{
            grid-column:1/-1;
        }

        .preview{
            margin-top:30px;
            background:#111;
            border:1px solid rgba(255,255,255,0.06);
            border-radius:18px;
            padding:20px;
        }

        pre{
            white-space:pre-wrap;
            word-break:break-word;
            color:#00ff99;
        }

        .actions{
            margin-top:25px;
            display:flex;
            gap:15px;
        }

        .download-all{
            background:#00aa55;
        }

        .delete-btn{
            background:#ff3333;
        }

        img{
            width:120px;
            border-radius:14px;
            margin-top:15px;
            border:1px solid rgba(255,255,255,0.08);
        }

        .readonly{
            opacity:0.7;
            cursor:not-allowed;
        }
    </style>
</head>
<body>

    <div class="sidebar">

        <h1>Pliki JSON</h1>

        <div class="top-buttons">
            <button onclick="createNewFile()">
                + Nowy plik
            </button>

            <button class="download-all" onclick="downloadAllFiles()">
                Pobierz wszystkie
            </button>
        </div>

        <div class="file-list" id="fileList"></div>

    </div>

    <div class="editor">

        <h2>Edytor Gry</h2>

        <div class="form-grid">

            <div class="input-group">
                <label>ID</label>
                <input type="text" id="id">
            </div>

            <div class="input-group">
                <label>Tytuł</label>
                <input type="text" id="title">
            </div>

            <div class="input-group">
                <label>Platforma</label>
                <input type="text" id="platform" value="Steam" readonly class="readonly">
            </div>

            <div class="input-group">
                <label>Ranga</label>
                <select id="requiredTier">
                    <option value="standard">standard</option>
                    <option value="plus">plus</option>
                    <option value="premium">premium</option>
                </select>
            </div>

            <div class="input-group full">
                <label>Ikona URL</label>
                <input type="text" id="icon">
            </div>

            <div class="input-group full">
                <label>Licencja</label>
                <input type="text" id="correctLicense" readonly class="readonly">
            </div>

            <div class="input-group full">
                <label>Download URL</label>
                <input type="text" id="downloadUrl">
            </div>

        </div>

        <div class="actions">

            <button onclick="saveCurrentFile()">
                Zapisz plik
            </button>

            <button class="delete-btn" onclick="deleteCurrentFile()">
                Usuń plik
            </button>

        </div>

        <div class="preview">

            <h3>Podgląd JSON</h3>

            <img id="previewImage" src="" style="display:none;">

            <pre id="jsonPreview">{}</pre>

        </div>

    </div>

<script>

    let files = [];
    let currentIndex = -1;

    function randomNumbers(length){

        let result = "";

        for(let i = 0; i < length; i++){

            result += Math.floor(Math.random() * 10);

        }

        return result;

    }

    function generateLicense(rank){

        return `DARKNITE-${randomNumbers(5)}-${rank}-${randomNumbers(5)}`;

    }

    const inputs = [
        "id",
        "title",
        "platform",
        "icon",
        "requiredTier",
        "correctLicense",
        "downloadUrl"
    ];

    function createNewFile(){

        const rank = "standard";

        const newFile = {
            id: "",
            title: "",
            platform: "Steam",
            icon: "",
            requiredTier: rank,
            correctLicense: generateLicense(rank),
            downloadUrl: ""
        };

        files.push(newFile);

        currentIndex = files.length - 1;

        renderFiles();

        loadFile(currentIndex);

    }

    function renderFiles(){

        const list = document.getElementById("fileList");

        list.innerHTML = "";

        files.forEach((file, index) => {

            const div = document.createElement("div");

            div.className = "file-item";

            div.innerHTML = `
                <strong>${file.id || "Nowy plik"}</strong><br>
                <small>${file.title || "Brak tytułu"}</small>
            `;

            div.onclick = () => {

                saveInputsToCurrent();

                loadFile(index);

            };

            list.appendChild(div);

        });

    }

    function loadFile(index){

        currentIndex = index;

        const file = files[index];

        inputs.forEach(id => {

            document.getElementById(id).value =
                file[id] || "";

        });

        updatePreview();

    }

    function saveInputsToCurrent(){

        if(currentIndex === -1) return;

        const currentFile = files[currentIndex];

        currentFile.id =
            document.getElementById("id").value;

        currentFile.title =
            document.getElementById("title").value;

        currentFile.platform = "Steam";

        currentFile.icon =
            document.getElementById("icon").value;

        currentFile.requiredTier =
            document.getElementById("requiredTier").value;

        currentFile.downloadUrl =
            document.getElementById("downloadUrl").value;

    }

    function updatePreview(){

        if(currentIndex === -1) return;

        const file = files[currentIndex];

        document.getElementById("correctLicense").value =
            file.correctLicense;

        const json =
            JSON.stringify(file, null, 4);

        document.getElementById("jsonPreview")
            .textContent = json;

        const img =
            document.getElementById("previewImage");

        if(file.icon){

            img.src = file.icon;

            img.style.display = "block";

        } else {

            img.style.display = "none";

        }

    }

    document.getElementById("requiredTier")
        .addEventListener("change", () => {

            if(currentIndex === -1) return;

            const currentFile = files[currentIndex];

            const rank =
                document.getElementById("requiredTier").value;

            currentFile.requiredTier = rank;

            currentFile.correctLicense =
                generateLicense(rank);

            updatePreview();

            renderFiles();

        });

    [
        "id",
        "title",
        "icon",
        "downloadUrl"
    ].forEach(id => {

        document.getElementById(id)
            .addEventListener("input", () => {

                saveInputsToCurrent();

                updatePreview();

                renderFiles();

            });

    });

    function saveCurrentFile(){

        saveInputsToCurrent();

        if(currentIndex === -1){

            alert("Stwórz plik.");

            return;

        }

        const file = files[currentIndex];

        if(!file.id){

            alert("ID jest wymagane.");

            return;

        }

        const json =
            JSON.stringify(file, null, 4);

        const blob =
            new Blob([json], {
                type: "application/json"
            });

        const a =
            document.createElement("a");

        a.href =
            URL.createObjectURL(blob);

        a.download =
            file.id + ".json";

        document.body.appendChild(a);

        a.click();

        document.body.removeChild(a);

    }

    async function downloadAllFiles(){

        saveInputsToCurrent();

        for(const file of files){

            if(!file.id) continue;

            const json =
                JSON.stringify(file, null, 4);

            const blob =
                new Blob([json], {
                    type: "application/json"
                });

            const a =
                document.createElement("a");

            a.href =
                URL.createObjectURL(blob);

            a.download =
                file.id + ".json";

            document.body.appendChild(a);

            a.click();

            document.body.removeChild(a);

            await new Promise(resolve =>
                setTimeout(resolve, 250)
            );

        }

    }

    function deleteCurrentFile(){

        if(currentIndex === -1) return;

        files.splice(currentIndex, 1);

        currentIndex = -1;

        renderFiles();

        [
            "id",
            "title",
            "icon",
            "downloadUrl"
        ].forEach(id => {

            document.getElementById(id).value = "";

        });

        document.getElementById("platform").value =
            "Steam";

        document.getElementById("requiredTier").value =
            "standard";

        document.getElementById("correctLicense").value =
            "";

        document.getElementById("jsonPreview")
            .textContent = "{}";

        document.getElementById("previewImage")
            .style.display = "none";

    }

</script>
</body>
</html>
